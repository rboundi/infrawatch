services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infrawatch
      POSTGRES_USER: infrawatch
      POSTGRES_PASSWORD: infrawatch_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrawatch -d infrawatch"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: infrawatch
      DB_USER: infrawatch
      DB_PASSWORD: infrawatch_dev
      PORT: 3001
    ports:
      - "3002:3001"

  web:
    build: packages/web
    depends_on:
      - api
    environment:
      API_URL: http://api:3001
    ports:
      - "5173:5173"

volumes:
  pgdata:
