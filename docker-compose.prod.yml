services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-infrawatch}
      POSTGRES_USER: ${DB_USER:-infrawatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - infrawatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infrawatch} -d ${DB_NAME:-infrawatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-infrawatch}
      DB_USER: ${DB_USER:-infrawatch}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      API_KEY: ${API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      VERSION_CHECK_INTERVAL_HOURS: ${VERSION_CHECK_INTERVAL_HOURS:-12}
      ALERT_DIGEST_HOUR: ${ALERT_DIGEST_HOUR:-8}
      REPORT_STORAGE_PATH: /data/reports
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      - reports:/data/reports
    networks:
      - infrawatch-net
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - infrawatch-net
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  infrawatch-net:
    driver: bridge

volumes:
  pgdata:
  reports:
