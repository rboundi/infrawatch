services:
  api:
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/server/tsconfig.json:/app/packages/server/tsconfig.json
      - ./packages/scanner/src:/app/packages/scanner/src
    command: npx tsx watch packages/server/src/index.ts
    working_dir: /app

  web:
    volumes:
      - ./packages/web/src:/app/src
      - ./packages/web/index.html:/app/index.html
      - ./packages/web/vite.config.ts:/app/vite.config.ts
      - ./packages/web/tailwind.config.js:/app/tailwind.config.js
      - ./packages/web/postcss.config.js:/app/postcss.config.js
